name: HeartBeatWatch
options:
  bundleIdPrefix: com.heartbeat
  createIntermediateGroups: true

targets:
  "HeartBeat Watch App":
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: "HeartBeat Watch App"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heartbeat.watch
        INFOPLIST_FILE: "HeartBeat Watch App/Info.plist"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
    entitlements:
      path: "HeartBeat Watch App/HeartBeat_Watch_App.entitlements"
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    dependencies:
      - sdk: HealthKit.framework
